<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed | Tech Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #dcfce7 0%, #bbf7d0 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
        
        .success-card { background: white; border-radius: 24px; padding: 3rem 2rem; text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); max-width: 480px; width: 100%; animation: fadeScaleUp 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1); }
        
        @keyframes fadeScaleUp { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        .success-icon { width: 100px; height: 100px; background: linear-gradient(135deg, #16a34a, #22c55e); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; animation: bounce 1s ease infinite; }
        .success-icon i { color: white; font-size: 3rem; }
        
        h1 { font-size: 1.8rem; font-weight: 700; color: #1e293b; margin-bottom: 0.5rem; }
        .subtitle { color: #6b7280; font-size: 1rem; margin-bottom: 2rem; }
        
        .order-id { background: #f0fdf4; padding: 12px 20px; border-radius: 12px; margin-bottom: 2rem; }
        .order-id span { color: #16a34a; font-weight: 600; font-size: 1.1rem; font-family: monospace; }
        
        .order-details { text-align: left; background: #f8fafc; border-radius: 12px; padding: 20px; margin-bottom: 2rem; }
        .order-details h3 { font-size: 0.9rem; color: #6b7280; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        .order-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.95rem; }
        .order-row span:last-child { font-weight: 600; }
        
        .btn-home { display: inline-flex; align-items: center; gap: 8px; background: #2874f0; color: white; padding: 14px 28px; border-radius: 60px; font-weight: 600; text-decoration: none; transition: all 0.2s; }
        .btn-home:hover { background: #1a5cd8; transform: translateY(-2px); }
        
        .confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
        .confetti div { position: absolute; width: 10px; height: 10px; background: #fbbf24; border-radius: 50%; animation: fall 3s linear infinite; }
        
        @keyframes fall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="confetti" id="confetti"></div>

    <div class="success-card">
        <div class="success-icon"><i class="fas fa-check"></i></div>
        
        <h1>🎉 Order Confirmed!</h1>
        <p class="subtitle">Thank you for your purchase</p>
        
        <div class="order-id">
            Order ID: <span id="orderId">TS2025042412345</span>
        </div>
        
        <div class="order-details">
            <h3>Order Details</h3>
            <div class="order-row"><span>Items</span><span id="itemCount">0</span></div>
            <div class="order-row"><span>Total Amount</span><span id="orderAmount">₹0</span></div>
            <div class="order-row"><span>Payment Method</span><span>UPI/Card</span></div>
            <div class="order-row"><span>Estimated Delivery</span><span>3-5 Business Days</span></div>
        </div>
        
        <p style="color:#6b7280;font-size:0.9rem;margin-bottom:20px;">
            A confirmation email has been sent to your registered email.<br>
            You can track your order in My Orders section.
        </p>
        
        <a href="index.html" class="btn-home"><i class="fas fa-home"></i> Continue Shopping</a>
    </div>

    <script>
        // Generate order ID
        const orderId = 'TS' + Date.now();
        document.getElementById('orderId').textContent = orderId;
        
        // Render confetti
        const confetti = document.getElementById('confetti');
        const colors = ['#fbbf24', '#fb923c', '#f87171', '#60a5fa', '#a78bfa'];
        for (let i = 0; i < 30; i++) {
            const conf = document.createElement('div');
            conf.style.left = Math.random() * 100 + '%';
            conf.style.animationDelay = Math.random() * 3 + 's';
            conf.style.background = colors[Math.floor(Math.random() * colors.length)];
            confetti.appendChild(conf);
        }
    </script>
</body>
</html>
