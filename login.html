<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Tech Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
        
        .bg-blob { position: fixed; width: 300px; height: 300px; background: radial-gradient(circle, rgba(40,116,240,0.15) 0%, rgba(40,116,240,0) 70%); border-radius: 50%; z-index: 0; animation: floatBlob 12s infinite alternate ease-in-out; }
        .blob1 { top: 10%; left: -5%; width: 400px; height: 400px; animation-duration: 18s; }
        .blob2 { bottom: 5%; right: -5%; width: 350px; height: 350px; background: radial-gradient(circle, rgba(255,184,28,0.12) 0%, rgba(255,184,28,0) 70%); animation-duration: 14s; }
        
        @keyframes floatBlob { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(30px, 30px) scale(1.1); } }
        
        .login-container { width: 100%; max-width: 460px; z-index: 2; position: relative; animation: fadeScaleUp 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1); }
        @keyframes fadeScaleUp { from { opacity: 0; transform: scale(0.96) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        
        .login-card { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(2px); border-radius: 2rem; padding: 2.2rem 2rem 2.5rem; box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25); border: 1px solid rgba(255,255,255,0.5); }
        .brand-header { text-align: center; margin-bottom: 2rem; }
        .brand-logo { font-size: 2.4rem; font-weight: 800; background: linear-gradient(135deg, #2874f0, #0a46b3); -webkit-background-clip: text; background-clip: text; color: transparent; display: inline-flex; align-items: center; gap: 8px; font-family: 'Poppins', sans-serif; }
        .brand-logo i { background: none; color: #ffb81c; font-size: 2.2rem; }
        .tagline { color: #5a6874; font-size: 0.85rem; margin-top: 8px; }
        
        .welcome-text { font-size: 1.7rem; font-weight: 700; margin-bottom: 0.25rem; color: #1e293b; }
        .welcome-sub { color: #5b6e8c; font-size: 0.85rem; margin-bottom: 1.8rem; }
        
        .input-group { margin-bottom: 1.4rem; position: relative; }
        .input-group i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 1.1rem; }
        .input-group input { width: 100%; padding: 14px 16px 14px 46px; font-size: 1rem; border: 1.5px solid #e2e8f0; border-radius: 60px; outline: none; font-family: 'Inter', sans-serif; background: #fefefe; transition: all 0.2s; }
        .input-group input:focus { border-color: #2874f0; box-shadow: 0 0 0 3px rgba(40,116,240,0.1); }
        
        .options-row { display: flex; justify-content: space-between; align-items: center; margin: 1rem 0 1.6rem; font-size: 0.85rem; }
        .checkbox { display: flex; align-items: center; gap: 6px; color: #475569; }
        .checkbox input { width: 16px; height: 16px; cursor: pointer; }
        .forgot-link { text-decoration: none; color: #2874f0; font-weight: 500; }
        .forgot-link:hover { text-decoration: underline; }
        
        .login-btn { background: #2874f0; border: none; width: 100%; padding: 14px; border-radius: 60px; font-weight: 700; font-size: 1rem; color: white; cursor: pointer; transition: all 0.25s; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 1.5rem; }
        .login-btn:hover { background: #1a5cd8; transform: translateY(-2px); }
        .login-btn:disabled { background: #94a3b8; cursor: not-allowed; transform: none; }
        
        .divider { display: flex; align-items: center; gap: 12px; color: #94a3b8; font-size: 0.75rem; margin: 1rem 0 1.2rem; }
        .divider-line { flex: 1; height: 1px; background: #e2e8f0; }
        
        .social-login { display: flex; gap: 16px; justify-content: center; margin-bottom: 1.8rem; }
        .social-icon { width: 44px; height: 44px; background: #f1f5f9; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.2s; cursor: pointer; color: #334155; font-size: 1.3rem; text-decoration: none; }
        .social-icon:hover { background: #e6edf5; transform: translateY(-3px); }
        
        .signup-prompt { text-align: center; font-size: 0.85rem; color: #475569; }
        .signup-prompt a { color: #2874f0; font-weight: 600; text-decoration: none; }
        
        .toast-msg { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) scale(0.9); background: #1f2937; color: white; padding: 12px 24px; border-radius: 60px; font-size: 0.85rem; opacity: 0; transition: 0.2s; pointer-events: none; z-index: 200; }
        .toast-msg.show { opacity: 1; transform: translateX(-50%) scale(1); }
        
        @media (max-width: 520px) { .login-card { padding: 1.8rem 1.5rem 2rem; } .welcome-text { font-size: 1.5rem; } }
    </style>
</head>
<body>
    <div class="bg-blob blob1"></div>
    <div class="bg-blob blob2"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="brand-header">
                <div class="brand-logo"><i class="fas fa-store"></i> Tech Shop</div>
                <div class="tagline">India's shopping destination</div>
            </div>

            <div class="welcome-text">Welcome back 👋</div>
            <div class="welcome-sub">Sign in to continue</div>

            <form id="loginForm">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="text" id="loginInput" placeholder="Email address" required autocomplete="email">
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
                </div>

                <div class="options-row">
                    <label class="checkbox"><input type="checkbox" id="remember"> Remember me</label>
                    <a href="#" class="forgot-link" id="forgotBtn">Forgot password?</a>
                </div>

                <button type="submit" class="login-btn" id="loginBtn"><i class="fas fa-arrow-right-to-bracket"></i> Log In</button>
            </form>

            <div class="divider"><div class="divider-line"></div><span>or continue with</span><div class="divider-line"></div></div>

            <div class="social-login">
                <a href="#" class="social-icon"><i class="fab fa-google"></i></a>
                <a href="#" class="social-icon"><i class="fab fa-facebook-f"></i></a>
                <a href="#" class="social-icon"><i class="fab fa-apple"></i></a>
            </div>

            <div class="signup-prompt">Don't have an account? <a href="signup.html">Create new account</a></div>
        </div>
    </div>

    <div id="toastMsg" class="toast-msg">Welcome back!</div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const toast = document.getElementById('toastMsg');
        
        // Don't auto-redirect - let user login fresh if they click Sign In
        
        function showToast(message, isError = false) {
            toast.textContent = message;
            toast.style.backgroundColor = isError ? '#b91c1c' : '#1f2937';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }
        
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('loginInput').value.trim();
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                showToast('Please enter email and password', true);
                return;
            }
            
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Please wait...';
            
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    localStorage.setItem('techshop_temp_token', data.token);
                    localStorage.setItem('techshop_pending_email', data.email);
                    localStorage.setItem('techshop_otp_type', 'login');
                    
                    showToast('OTP sent to your email!');
                    setTimeout(() => window.location.href = 'otp.html', 1500);
                } else {
                    showToast(data.error || 'Login failed', true);
                }
            } catch (error) {
                showToast('Server error. Please try again.', true);
            }
            
            loginBtn.disabled = false;
            loginBtn.innerHTML = '<i class="fas fa-arrow-right-to-bracket"></i> Log In';
        });
        
        document.getElementById('forgotBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            const email = prompt('Enter your email address:');
            if (email) {
                try {
                    const res = await fetch('/api/auth/forgot-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email })
                    });
                    const data = await res.json();
                    showToast(data.message);
                } catch (error) {
                    showToast('Server error', true);
                }
            }
        });
    </script>
</body>
</html>
